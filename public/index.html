<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ambiart</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111315;
        color: #f3f5f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(920px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(40px, 8vw, 92px);
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        color: #c7d0d9;
        line-height: 1.6;
      }

      pre {
        overflow: auto;
        padding: 18px;
        border: 1px solid #30363d;
        border-radius: 8px;
        background: #171b20;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ambiart</h1>
      <p>A small wallpaper API for TV ambient displays. Try <code>/v1/wallpapers</code>, <code>/v1/wallpapers/random</code>, or <code>/v1/manifest</code>.</p>
      <pre id="preview">Loading random wallpaper...</pre>
    </main>
    <script>
      fetch("/v1/wallpapers/random")
        .then((response) => response.json())
        .then((payload) => {
          document.querySelector("#preview").textContent = JSON.stringify(payload, null, 2);
        })
        .catch((error) => {
          document.querySelector("#preview").textContent = error.message;
        });
    </script>
  </body>
</html>
