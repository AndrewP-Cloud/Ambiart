openapi: 3.1.0
info:
  title: Ambiart Wallpaper API
  version: 0.1.0
  description: Lightweight API for Google TV-style ambient wallpaper clients.
servers:
  - url: http://localhost:8787
paths:
  /health:
    get:
      summary: Service health
      responses:
        "200":
          description: Service status
  /v1/manifest:
    get:
      summary: API manifest
      responses:
        "200":
          description: API capability manifest
  /v1/wallpapers:
    get:
      summary: List NGA Open Access wallpapers
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: orientation
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Wallpaper list
  /v1/wallpapers/random:
    get:
      summary: Random NGA Open Access wallpaper
      responses:
        "200":
          description: Wallpaper response
        "404":
          description: No wallpaper matched filters
  /v1/wallpapers/{id}:
    get:
      summary: Get NGA Open Access wallpaper by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallpaper response
        "404":
          description: Wallpaper not found
  /v1/wallpapers/random.jpg:
    get:
      summary: Redirect to a random NGA Open Access JPEG
      responses:
        "302":
          description: Redirect to an NGA IIIF JPEG
        "404":
          description: No wallpaper matched filters
  /v1/wallpapers/{id}.jpg:
    get:
      summary: Redirect to an NGA Open Access JPEG by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: width
          in: query
          schema:
            type: integer
            minimum: 200
            maximum: 4096
      responses:
        "302":
          description: Redirect to an NGA IIIF JPEG
        "404":
          description: Wallpaper not found
  /v1/nga/wallpapers:
    get:
      summary: List National Gallery of Art wallpapers
      parameters:
        - name: category
          in: query
          description: Matches NGA visualBrowserClassification, classification, or subClassification.
          schema:
            type: string
        - name: artist
          in: query
          description: Partial match against NGA attribution.
          schema:
            type: string
        - name: orientation
          in: query
          schema:
            type: string
            enum:
              - landscape
              - portrait
              - square
        - name: q
          in: query
          description: Partial text search across title, artist, category, and assistive text.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: National Gallery wallpaper list
  /v1/nga/options:
    get:
      summary: List available National Gallery of Art filter options
      responses:
        "200":
          description: Available artist, category, and orientation filter values from the scanned NGA feed
  /v1/nga/wallpapers/random:
    get:
      summary: Random National Gallery of Art wallpaper
      parameters:
        - name: artist
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: orientation
          in: query
          schema:
            type: string
            enum:
              - landscape
              - portrait
              - square
      responses:
        "200":
          description: Wallpaper response
        "404":
          description: No National Gallery wallpaper matched filters
  /v1/nga/wallpapers/random.jpg:
    get:
      summary: Redirect to a random National Gallery of Art JPEG
      parameters:
        - name: orientation
          in: query
          schema:
            type: string
            enum:
              - landscape
              - portrait
              - square
        - name: width
          in: query
          schema:
            type: integer
            minimum: 200
            maximum: 4096
        - name: artist
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to an NGA IIIF JPEG
        "404":
          description: No National Gallery wallpaper matched filters
  /v1/nga/wallpapers/{id}:
    get:
      summary: Get National Gallery of Art wallpaper by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallpaper response
        "404":
          description: Wallpaper not found
  /v1/nga/wallpapers/{id}.jpg:
    get:
      summary: Redirect to a National Gallery of Art JPEG by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: width
          in: query
          schema:
            type: integer
            minimum: 200
            maximum: 4096
      responses:
        "302":
          description: Redirect to an NGA IIIF JPEG
        "404":
          description: Wallpaper not found
